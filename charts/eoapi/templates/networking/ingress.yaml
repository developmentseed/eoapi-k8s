{{- if and .Values.ingress.enabled (include "eoapi.hasEnabledService" . | trim) }}
{{- $ingressAnnotations := .Values.ingress.annotations | default dict }}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion }}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion }}
apiVersion: networking.k8s.io/v1beta1
{{- else }}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    app: {{ .Release.Name }}-ingress
  annotations:
    {{- if eq .Values.ingress.className "nginx" }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    {{- $nginxBrowserRedirect := include "eoapi.nginxBrowserRedirectSnippet" . | trim -}}
    {{- if and $nginxBrowserRedirect (not (hasKey $ingressAnnotations "nginx.ingress.kubernetes.io/server-snippet")) }}
    nginx.ingress.kubernetes.io/server-snippet: |
{{ include "eoapi.nginxBrowserRedirectSnippet" . | nindent 6 }}
    {{- end }}
    {{- end }}
    {{- if eq .Values.ingress.className "traefik" }}
    {{- if and .Values.ingress.entrypoints (not (hasKey $ingressAnnotations "traefik.ingress.kubernetes.io/router.entrypoints")) }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.ingress.entrypoints | quote }}
    {{- end }}
    {{- $traefikMiddlewares := include "eoapi.ingressTraefikMiddlewares" . | trim -}}
    {{- if $traefikMiddlewares }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ $traefikMiddlewares }}
    {{- end }}
    {{- end }}
    {{- with $ingressAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if and .Values.ingress.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if .Values.ingress.hosts }}
    {{- range .Values.ingress.hosts }}
    - host: {{ . }}
      http:
        paths:
          {{- include "eoapi.ingressPaths" $ | nindent 10 }}
    {{- end }}
    {{- else }}
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host }}
      {{- end }}
      http:
        paths:
          {{- include "eoapi.ingressPaths" . | nindent 10 }}
    {{- end }}
  {{- if and .Values.ingress.tls.enabled (or .Values.ingress.hosts .Values.ingress.host) }}
  tls:
    - hosts:
        {{- if .Values.ingress.hosts }}
        {{- range .Values.ingress.hosts }}
        - {{ . }}
        {{- end }}
        {{- else if .Values.ingress.host }}
        - {{ .Values.ingress.host }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
