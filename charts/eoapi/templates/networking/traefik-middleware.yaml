{{- if and .Values.ingress.enabled (eq .Values.ingress.className "traefik") }}
{{- $prefixes := include "eoapi.traefikStripPrefixes" . | fromJsonArray -}}
{{- if $prefixes }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-strip-prefix-middleware
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-ingress
spec:
  stripPrefix:
    prefixes:
      {{- range $prefixes }}
      - {{ . }}
      {{- end }}
{{- end }}
{{- $browser := .Values.browser }}
{{- if and $browser $browser.enabled (or (not $browser.ingress) $browser.ingress.enabled) }}
{{- $browserPath := trimSuffix "/" ($browser.ingress.path | default "/browser") }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-browser-redirect-middleware
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-ingress
spec:
  redirectRegex:
    regex: '^(https?://[^/]+){{ regexQuoteMeta $browserPath }}$'
    replacement: "${1}{{ $browserPath }}/"
    permanent: true
{{- end }}
{{- end }}
