suite: test ingress routing without stripPrefix middleware
templates:
  - templates/_helpers/networking.tpl
  - templates/networking/auth-proxy-ingress.yaml
  - templates/networking/browser-ingress.yaml
  - templates/networking/ingress.yaml

tests:
  - it: should route auth-proxy on rewrite-free ingress when enabled on nginx
    template: templates/networking/auth-proxy-ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: nginx
      stac.enabled: true
      stac.ingress.enabled: true
      stac.ingress.path: "/stac"
      stac-auth-proxy.enabled: true
      service.port: 8080
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-auth-proxy-ingress
      - contains:
          path: spec.rules[0].http.paths
          content:
            pathType: Prefix
            path: /stac
            backend:
              service:
                name: RELEASE-NAME-stac-auth-proxy
                port:
                  number: 8080
      - notExists:
          path: metadata.annotations["nginx.ingress.kubernetes.io/rewrite-target"]
      - notExists:
          path: metadata.annotations["nginx.ingress.kubernetes.io/use-regex"]

  - it: should omit auth-proxy path from main nginx ingress
    template: templates/networking/ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: nginx
      stac.enabled: true
      stac.ingress.path: "/stac"
      stac-auth-proxy.enabled: true
      raster.enabled: true
      service.port: 8080
    asserts:
      - notContains:
          path: spec.rules[0].http.paths
          content:
            path: /stac
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/rewrite-target"]
          value: /$2

  - it: should route ingress directly to stac when auth-proxy is disabled
    template: templates/networking/ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: nginx
      stac.enabled: true
      stac.ingress.enabled: true
      stac.ingress.path: "/stac"
      stac-auth-proxy.enabled: false
      service.port: 8080
    asserts:
      - contains:
          path: spec.rules[0].http.paths
          content:
            pathType: ImplementationSpecific
            path: /stac(/|$)(.*)
            backend:
              service:
                name: RELEASE-NAME-stac
                port:
                  number: 8080

  - it: should not create auth-proxy ingress when auth-proxy is disabled
    template: templates/networking/auth-proxy-ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: nginx
      stac.enabled: true
      stac-auth-proxy.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should keep auth-proxy on main ingress for traefik
    template: templates/networking/ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: traefik
      stac.enabled: true
      stac.ingress.path: "/stac"
      stac-auth-proxy.enabled: true
      raster.enabled: false
      vector.enabled: false
      multidim.enabled: false
      browser.enabled: false
      docServer.enabled: false
      service.port: 8080
    asserts:
      - contains:
          path: spec.rules[0].http.paths
          content:
            pathType: Prefix
            path: /stac
            backend:
              service:
                name: RELEASE-NAME-stac-auth-proxy
                port:
                  number: 8080

  - it: should not create auth-proxy ingress for traefik
    template: templates/networking/auth-proxy-ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: traefik
      stac.enabled: true
      stac-auth-proxy.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should omit auth-proxy and browser from main nginx ingress when both enabled
    template: templates/networking/ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: nginx
      stac.enabled: true
      stac.ingress.enabled: true
      stac.ingress.path: "/stac"
      stac-auth-proxy.enabled: true
      browser.enabled: true
      raster.enabled: true
      service.port: 8080
    asserts:
      - notContains:
          path: spec.rules[0].http.paths
          content:
            path: /stac
      - notContains:
          path: spec.rules[0].http.paths
          content:
            path: /browser
