suite: browser bare-path redirect middleware
templates:
  - templates/_helpers/networking.tpl
  - templates/networking/ingress.yaml
  - templates/networking/browser-ingress.yaml
  - templates/networking/traefik-middleware.yaml
set:
  ingress.enabled: true
  ingress.host: eoapi.local
  stac.enabled: false
  raster.enabled: false
  vector.enabled: false
  multidim.enabled: false
tests:
  - it: "redirects the browser bare path to its trailing-slash form on traefik"
    template: templates/networking/traefik-middleware.yaml
    set:
      ingress.className: traefik
      browser.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-browser-redirect-middleware
      - equal:
          path: spec.redirectRegex.regex
          value: "^(https?://[^/]+)/browser$"
      - equal:
          path: spec.redirectRegex.replacement
          value: "${1}/browser/"
      - equal:
          path: spec.redirectRegex.permanent
          value: true

  - it: "creates no traefik middleware on the nginx controller"
    template: templates/networking/traefik-middleware.yaml
    set:
      ingress.className: nginx
      browser.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: "adds an nginx exact-path redirect ingress for the browser bare path"
    template: templates/networking/browser-ingress.yaml
    set:
      ingress.className: nginx
      browser.enabled: true
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-browser-redirect
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/permanent-redirect"]
          value: "/browser/"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/permanent-redirect-code"]
          value: "301"
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: "/browser"
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: "Exact"

  - it: "omits the nginx browser redirect when browser is disabled"
    template: templates/networking/browser-ingress.yaml
    set:
      ingress.className: nginx
      browser.enabled: false
      stac.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: "does not add rewrite-target to nginx browser ingress resources"
    template: templates/networking/browser-ingress.yaml
    set:
      ingress.className: nginx
      browser.enabled: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /$2
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/permanent-redirect: /elsewhere
        nginx.ingress.kubernetes.io/permanent-redirect-code: "308"
        nginx.ingress.kubernetes.io/server-snippet: return 302 /elsewhere;
        nginx.ingress.kubernetes.io/configuration-snippet: return 302 /elsewhere;
        nginx.ingress.kubernetes.io/enable-cors: "true"
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-browser-ingress
    asserts:
      - notExists:
          path: metadata.annotations["nginx.ingress.kubernetes.io/rewrite-target"]
      - notExists:
          path: metadata.annotations["nginx.ingress.kubernetes.io/use-regex"]
      - notExists:
          path: metadata.annotations["nginx.ingress.kubernetes.io/server-snippet"]
      - notExists:
          path: metadata.annotations["nginx.ingress.kubernetes.io/configuration-snippet"]
      - notExists:
          path: metadata.annotations["nginx.ingress.kubernetes.io/permanent-redirect"]
      - notExists:
          path: metadata.annotations["nginx.ingress.kubernetes.io/permanent-redirect-code"]
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/enable-cors"]
          value: "true"

  - it: "does not let user annotations override the nginx browser redirect"
    template: templates/networking/browser-ingress.yaml
    set:
      ingress.className: nginx
      browser.enabled: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/permanent-redirect: /elsewhere
        nginx.ingress.kubernetes.io/permanent-redirect-code: "308"
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-browser-redirect
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/permanent-redirect"]
          value: "/browser/"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/permanent-redirect-code"]
          value: "301"

  - it: "chains the browser redirect middleware onto the traefik router annotation"
    template: templates/networking/ingress.yaml
    set:
      ingress.className: traefik
      stac.enabled: true
      browser.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
          value: "NAMESPACE-RELEASE-NAME-strip-prefix-middleware@kubernetescrd,NAMESPACE-RELEASE-NAME-browser-redirect-middleware@kubernetescrd"

  - it: "omits strip-prefix from the annotation when browser is the only enabled service"
    template: templates/networking/ingress.yaml
    set:
      ingress.className: traefik
      browser.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
          value: "NAMESPACE-RELEASE-NAME-browser-redirect-middleware@kubernetescrd"

  - it: "omits the browser redirect from the annotation when the browser is disabled"
    template: templates/networking/ingress.yaml
    set:
      ingress.className: traefik
      stac.enabled: true
      browser.enabled: false
    asserts:
      - equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
          value: "NAMESPACE-RELEASE-NAME-strip-prefix-middleware@kubernetescrd"
