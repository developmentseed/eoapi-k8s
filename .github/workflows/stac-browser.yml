name: build-stac-browser

on:
  push:
    branches: [main]
    paths:
      - "charts/eoapi/values.yaml"
      - "patches/stac-browser/**"
      - ".github/workflows/stac-browser.yml"
  workflow_dispatch:
    inputs:
      STAC_BROWSER_VERSION:
        description: "Published image tag to build (e.g. 4.0.1-eoapi.1)"
        required: true
        default: "4.0.1-eoapi.1"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout eoapi-k8s
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: eoapi-k8s

      - name: Extract and normalize version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.STAC_BROWSER_VERSION }}"
          else
            RAW_TAG=$(yq '.browser.image.tag' eoapi-k8s/charts/eoapi/values.yaml)
          fi
          IMAGE_TAG="${RAW_TAG#v}"
          UPSTREAM_VERSION="${IMAGE_TAG%%-eoapi.*}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "upstream_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "upstream_ref=v$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set IMAGE_NAME
        run: echo "IMAGE_NAME=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}/stac-browser" >> "$GITHUB_ENV"

      - name: Log in to the GitHub container registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.image_tag }}" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists, skipping build"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout STAC Browser repository
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: radiantearth/stac-browser
          ref: ${{ steps.version.outputs.upstream_ref }}
          path: stac-browser

      - name: Apply dynamic pathPrefix patch
        if: steps.check.outputs.skip == 'false'
        run: git -C stac-browser apply ../eoapi-k8s/patches/stac-browser/dynamic-pathprefix.patch

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push Docker image
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: stac-browser
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.upstream_version }}
            pathPrefix=/browser/
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.upstream_ref }}
            org.opencontainers.image.source=https://github.com/radiantearth/stac-browser
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline
